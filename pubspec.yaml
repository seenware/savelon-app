name: contacts
description: "Secure way to store your contacts"
publish_to: "none"

version: 5.0.0+137

environment:
  sdk: ^3.9.2

dependencies:
  flutter_localizations:
    sdk: flutter
  archive: ^4.0.9
  bip39: ^1.0.6
  collection: ^1.19.1
  connectivity_plus: ^7.0.0
  crypto: ^3.0.7
  cryptography: ^2.9.0
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.3.0
  encrypt: ^5.0.3
  file_picker: ^10.3.10
  file_saver: ^0.3.1
  flex_seed_scheme: ^4.0.1
  flutter:
    sdk: flutter
  flutter_contacts: ^1.1.9+2
  flutter_hooks: ^0.21.3+1
  flutter_image_compress: ^2.4.0
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^9.2.4
  go_router: ^17.0.0
  hooks_riverpod: ^3.0.3
  image_cropper: ^9.1.0
  image_picker: ^1.2.0
  in_app_review: ^2.0.11
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  phone_numbers_parser: ^9.0.20
  purchases_flutter: ^9.12.3
  purchases_ui_flutter: ^9.12.3
  shared_preferences: ^2.5.4
  sqflite_sqlcipher: ^3.4.0
  sqlcipher_flutter_libs: ^0.6.8
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  webview_flutter: ^4.13.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^3.0.3

flutter_launcher_icons:
  ios: true
  android: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon_on_light.png"
  image_path: "assets/icon/app_icon_on_light.png"
  image_path_android: "assets/logo/logo_on_light.png"
  image_path_ios_dark_transparent: "assets/icon/app_icon_on_dark.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter_native_splash:
  android: false
  ios: true
  web: true

  image: assets/splash/splash_light.png
  image_dark: assets/splash/splash_dark.png

  color: "#f4f5f7"
  color_dark: "#111417"

  # Android 12+ specific configuration
  android_12:
    color: "#f4f5f7"
    color_dark: "#111417"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo/logo_on_light.png
    - assets/logo/logo_on_dark.png
    - assets/splash/splash_light.png
    - assets/splash/splash_dark.png
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/animations/fire.json
    - assets/animations/shield.json
    - assets/animations/vault-created.json
    - assets/animations/check.json
    - assets/onboarding/
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
